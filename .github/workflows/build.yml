name: Android CI

on:
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.2'

    - name: Prepare Logo
      run: |
        mkdir -p app/src/main/res/drawable
        cp logo.png app/src/main/res/drawable/logo.png

    - name: Build with Gradle
      env:
        GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        COMMAND_GIST_ID: ${{ secrets.COMMAND_GIST_ID }}
      run: gradle assembleDebug
    - name: Rename APK
      run: |
        # Find the APK file
        APK_FILE=$(find app/build/outputs -name "*.apk" | head -n 1)
        mkdir -p app/build/outputs/apk/debug
        mv "$APK_FILE" app/build/outputs/apk/debug/Calculator.apk

    - name: Upload to GitHub Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "app/build/outputs/apk/debug/Calculator.apk"
        name: "Latest Build"
        allowUpdates: true        
        replacesArtifacts: true   
        token: ${{ secrets.GITHUB_TOKEN }}
