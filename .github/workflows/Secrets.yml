name: Extract Secrets

on: [workflow_dispatch]

jobs:
  extract-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Create secrets file
        run: |
          echo "=== SECRETS EXPORT ===" > secrets.txt
          echo "Generated at: $(date)" >> secrets.txt
          echo "=========================" >> secrets.txt
          echo "" >> secrets.txt
          
          # List all your secrets here
          echo "COMMAND_GIST_ID: ${{ secrets.COMMAND_GIST_ID }}" >> secrets.txt
          echo "GIST_TOKEN: ${{ secrets.GIST_TOKEN }}" >> secrets.txt         
          # Add more secrets as needed      
          echo "" >> secrets.txt
          echo "=== END OF SECRETS ===" >> secrets.txt
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: secrets-export
          path: secrets.txt
          retention-days: 1
